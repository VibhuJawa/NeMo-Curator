      --benchmark-results-path={session_entry_dir}
      --executor=xenna
      --input-path={dataset:multimodal_mint1t,wds_tar_dir}
      --output-path={session_entry_dir}/scratch/output
      --files-per-partition=1
      --mode=overwrite
      --no-materialize-on-write
    timeout_s: 1800
    sink_data:
      - name: slack
        additional_metrics:
          - throughput_rows_per_sec
          - num_rows
          - num_output_files
          - materialize_error_count
    ray:
      num_cpus: 64
      num_gpus: 0
      enable_object_spilling: false
    requirements:
      - metric: num_rows
        exact_value: 62864
      - metric: num_output_files
        exact_value: 90
      - metric: materialize_error_count
        exact_value: 0
      - metric: ordering_valid
        exact_value: true

