###############################################################################
# ASR Audio Tagging Pipeline
###############################################################################
#
# Processes raw audio into labelled ASR training data.
#
# Pipeline stages:
#   0. ManifestReader          - Read input JSONL manifest
#   1. ResampleAudio           - Resample audio to 16 kHz mono WAV
#   2. PyAnnoteDiarization     - Speaker diarization + overlap detection
#   3. SplitLongAudio          - Split segments exceeding max length
#   4. NeMoASRAligner          - Forced alignment via NeMo FastConformer
#   5. JoinSplitAudioMetadata  - Rejoin split metadata
#   6. MergeAlignmentDiar      - Merge ASR alignment with diarization
#   7. BandwidthEstimation     - Estimate audio bandwidth
#   8. SquimMetrics            - TorchSQUIM quality metrics
#   9. PrepareModuleSegments   - Prepare ASR-ready segments
#  10. NeMoASRAligner (2nd)    - Second-pass ASR transcription
#  11. ComputeWER              - Compute WER between two ASR transcripts
#  12. ManifestWriter          - Write output JSONL manifest
#
# Usage (from Curator repo root):
#   python tutorials/audio/tagging/main.py \
#     --config-path . \
#     --config-name asr_pipeline \
#     input_manifest=/data/input.jsonl \
#     final_manifest=/data/asr_output.jsonl \
#     hf_token=<your_hf_token>

defaults:
  - _self_
  - override hydra/job_logging: none
  - override hydra/hydra_logging: none

hydra:
  run:
    dir: .
  output_subdir: null

documentation: |
  ASR Audio Tagging Pipeline
  ##########################

  Processes raw audio through diarization, ASR alignment, text
  normalization, and quality metrics to produce labelled segments
  suitable for automatic speech recognition training.

  Compared to the TTS pipeline, the ASR pipeline uses a lower
  ``full_utterance_ratio`` (0.8 vs 1.0) to allow partial utterances,
  which is beneficial for ASR training data diversity.

  **Required arguments**:

  * **input_manifest**: Path to input JSONL manifest with raw audio entries.
    Each line must contain ``audio_filepath`` and ``audio_item_id``.
  * **final_manifest**: Path for the output JSONL manifest.
  * **hf_token**: HuggingFace token for PyAnnote model access.

  **Output format**:

  Output manifest at ``${final_manifest}`` with labelled, segmented
  audio entries ready for ASR training.

# =============================================================================
# CORE CONFIGURATION
# =============================================================================

input_manifest: ???
final_manifest: ???
workspace_dir: /tmp/tagging_workspace
resampled_audio_dir: ${workspace_dir}/audio_resampled
language_short: en
hf_token: ""
sample_rate: 16000
max_segment_length: 40
execution_mode: streaming
text_key1: text
text_key2: text_2

# =============================================================================
# PIPELINE STAGES
# =============================================================================

stages:
  - _target_: nemo_curator.stages.audio.common.ManifestReader
    manifest_path: ${input_manifest}
    files_per_partition: 1

  - _target_: nemo_curator.stages.audio.tagging.ResampleAudioStage
    name: "ResampleAudio"
    resampled_audio_dir: ${resampled_audio_dir}
    input_format: "wav"
    target_sample_rate: ${sample_rate}
    target_format: "wav"
    target_nchannels: 1

  - _target_: nemo_curator.stages.audio.inference.speaker_diarization.pyannote.PyAnnoteDiarizationStage
    name: "PyAnnoteDiarization"
    hf_token: ${hf_token}
    max_length: ${max_segment_length}

  - _target_: nemo_curator.stages.audio.tagging.SplitLongAudioStage
    name: "SplitLongAudio"
    suggested_max_len: ${max_segment_length}
    min_len: 1.0

  - _target_: nemo_curator.stages.audio.tagging.inference.nemo_asr_align.NeMoASRAlignerStage
    name: "ASRAlignment"
    is_fastconformer: true
    decoder_type: rnnt
    batch_size: 32

  - _target_: nemo_curator.stages.audio.tagging.JoinSplitAudioMetadataStage
    name: "JoinSplitMetadata"

  - _target_: nemo_curator.stages.audio.tagging.MergeAlignmentDiarizationStage
    name: "MergeAlignmentDiar"
    text_key: ${text_key1}
    words_key: "words"

  - _target_: nemo_curator.stages.audio.metrics.bandwidth.BandwidthEstimationStage
    name: "BandwidthEstimation"

  - _target_: nemo_curator.stages.audio.metrics.squim.TorchSquimQualityMetricsStage
    name: "SquimMetrics"

  - _target_: nemo_curator.stages.audio.tagging.PrepareModuleSegmentsStage
    name: "PrepareModuleSegments"
    module: asr
    min_duration: 5
    max_duration: 20
    max_pause: 2
    terminal_punct_marks: ".!?。？！。"
    full_utterance_ratio: 0.8
    punctuation_split_only: false

  # Second pass ASR
  - _target_: nemo_curator.stages.audio.tagging.inference.nemo_asr_align.NeMoASRAlignerStage
    name: "ASRAlignment2"
    model_name: nvidia/stt_en_conformer_ctc_large
    is_fastconformer: False
    decoder_type: ctc
    batch_size: 64
    split_batch_size: 100
    text_key: ${text_key2}
    infer_segment_only: True
    compute_timestamps: False

  - _target_: nemo_curator.stages.audio.metrics.wer.ComputeWERStage
    name: "ComputeWER"
    language: ${language_short}
    hypothesis_text_key: ${text_key2}
    reference_text_key: ${text_key1}
    pnc_chars: ".?,"
    compute_pnc_wer: false

  - _target_: nemo_curator.stages.audio.common.ManifestWriterStage
    name: "ManifestWriter"
    output_path: ${final_manifest}
